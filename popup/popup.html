<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>

<div id="popup-content">

    <header id="popup-header">
        <button id="back-btn" class="icon-btn hidden">&#8592;</button>
        <h1 id="popup-title">Namastream</h1>
        <button id="close-btn" class="icon-btn">&#10005;</button>
    </header>

    <div id="view-default" class="view active">

        <section class="action-buttons">
            <button class="action-btn" data-target="view-channels" data-i18n="enable_disable_channels">Enable / Disable Channels</button>

            <div class="toggle-row">
                <span class="toggle-label" data-i18n="sort_by_gen">Sort by Gen</span>
                <button class="toggle-btn" id="sort-by-gen" data-on="false">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </button>
            </div>

            <button class="action-btn" data-target="view-layout" data-i18n="layout_options">Layout Options</button>
        </section>

        <div class="divider"></div>

        <section class="bar-toggles">
            <label class="check-row"><input type="checkbox" id="youtube-streams" checked>
                <span data-i18n="youtube_streams">Youtube Streams</span></label>
            <label class="check-row"><input type="checkbox" id="agenda" checked ><span>Agenda</span></label>
            <label class="check-row"><input type="checkbox" id="twitch-streams" checked>
                <span data-i18n="twitch_streams"> Twitch Streams</span></label>
        </section>

    </div>

    <div id="view-channels" class="view">

        <section class="channel-section">
            <h2 class="section-label">
                <span data-i18n="youtube_vtubers">YouTube VTubers</span>
                <span class="hint" data-i18n="left_right_click">
                    Left click: toggle · Right click: pin
                </span>
            </h2>
            <div id="yt-channel-grid" class="channel-grid">
            </div>
        </section>

        <section class="channel-section">
            <h2 class="section-label" data-i18n="twitch_vtubers">Twitch VTubers</h2>
            <div id="tw-channel-grid" class="channel-grid">
                <div class="channel-card disabled placeholder">
                    <div class="ch-avatar"></div>
                    <span class="ch-name" data-i18n="coming_soon">Coming soon</span>
                </div>
            </div>
        </section>

    </div>

    <div id="view-layout" class="view">

        <section class="layout-options">
            <label class="check-row"><input type="checkbox" id="layout-firefox-logo" checked><span data-i18n="firefox_logo">Firefox Logo</span></label>
            <label class="check-row"><input type="checkbox" id="layout-firefox-wordmark" checked><span data-i18n="firefox_wordmark">Firefox Wordmark</span></label>
            <label class="check-row"><input type="checkbox" id="layout-search-bar" checked><span data-i18n="search_bar">Search Bar</span></label>
            <label class="check-row"><input type="checkbox" id="layout-vertical-twitch"><span data-i18n="vertical_twitch">Vertical Twitch Bar</span></label>
            <label class="check-row"><input type="checkbox" id="layout-resizable-bar"><span data-i18n="resizable_bars">Resizable Bars</span></label>
            <div class="check-row-with-reset">
                <button class="action-btn" id="reposition-mode-btn" data-i18n="reposition_bars">Reposition Bars</button>
                <button class="reset-btn" id="reset-bar-positions" data-i18n="reset_pos">Reset pos</button>
            </div>
        </section>

    </div>

</div>

<script type="module" src="popup.js"></script>
</body>
</html>
