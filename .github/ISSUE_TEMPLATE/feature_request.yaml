name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

  - type: textarea
    id: feature
    attributes:
      label: Feature description
      description: Describe the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Why would this feature be useful?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, mockups, references, etc